# DefMon — Alembic Configuration
# Database URL is overridden at runtime by env.py using config.py settings.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden in env.py
sqlalchemy.url = postgresql+asyncpg://defmon:defmon@localhost:5432/defmon

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
