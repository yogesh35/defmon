version: "3.9"

services:
  siem:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: defmon
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - LOG_FILE=/app/data/logs/access.log
      - AUTH_LOG_FILE=/app/data/logs/auth.log
      - APP_LOG_FILE=/app/data/logs/app.log
      - DATABASE_URL=sqlite+aiosqlite:///./data/db/siem.db
      - JWT_SECRET=defmon-secret-change-in-production
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: defmon-simulator
    command: python -m simulator.generate_logs --rate medium
    volumes:
      - ./data:/app/data
    depends_on:
      - siem
    restart: unless-stopped
